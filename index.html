<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="家計簿">
<title>家計簿</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:#f2f2f7;color:#1c1c1e}
:root{
  --bg-primary:#ffffff;--bg-secondary:#f2f2f7;--bg-tertiary:#e5e5ea;
  --text-primary:#1c1c1e;--text-secondary:#6e6e73;
  --border:rgba(60,60,67,0.15);--border-md:rgba(60,60,67,0.3);
  --radius-md:10px;--radius-lg:14px;--blue:#007aff;--red:#ff3b30;--green:#34c759;
}
@media(prefers-color-scheme:dark){
  :root{--bg-primary:#1c1c1e;--bg-secondary:#2c2c2e;--bg-tertiary:#3a3a3c;--text-primary:#f2f2f7;--text-secondary:#8e8e93;--border:rgba(255,255,255,0.12);--border-md:rgba(255,255,255,0.25)}
  body{background:#000}
}
.app{max-width:430px;margin:0 auto;background:var(--bg-secondary);min-height:100dvh;display:flex;flex-direction:column}
/* Header */
.header{background:var(--bg-primary);padding:16px 20px 14px;border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.header h1{font-size:20px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px}
.add-btn{background:var(--text-primary);color:var(--bg-primary);border:none;border-radius:20px;padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px}
.add-btn:active{opacity:0.7}
.nav{display:flex;background:var(--bg-tertiary);border-radius:var(--radius-md);padding:2px}
.nav-btn{flex:1;background:none;border:none;padding:7px 0;font-size:11px;color:var(--text-secondary);cursor:pointer;border-radius:8px;font-weight:400;font-family:inherit;transition:all .15s}
.nav-btn.active{background:var(--bg-primary);color:var(--text-primary);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.12)}
/* Period nav */
.period-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg-primary);border-bottom:0.5px solid var(--border)}
.period-label{font-size:15px;font-weight:600;color:var(--text-primary)}
.period-arrow{background:var(--bg-secondary);border:none;border-radius:var(--radius-md);width:34px;height:34px;cursor:pointer;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;font-size:18px}
.period-arrow:active{opacity:0.6}
/* Content */
.content{padding:16px;flex:1}
/* Summary */
.summary-cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:16px}
.summary-card{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.summary-card .label{font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:500}
.summary-card .amount{font-size:22px;font-weight:600;color:var(--text-primary);line-height:1.1}
.summary-card .amount span{font-size:13px;font-weight:400}
.summary-card.full{grid-column:1/-1}
.summary-total{font-size:28px;font-weight:700}
/* Section title */
.section-title{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
/* Chart */
.chart-wrap{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px}
.bar-chart{display:flex;flex-direction:column;gap:11px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:11px;width:44px;flex-shrink:0;text-align:right;font-weight:500}
.bar-track{flex:1;height:22px;background:var(--bg-secondary);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.bar-amount{font-size:12px;color:var(--text-secondary);width:60px;flex-shrink:0;text-align:right;font-variant-numeric:tabular-nums}
/* Monthly bars */
.month-bars{display:flex;align-items:flex-end;gap:4px;height:80px;margin-top:12px}
.month-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.month-bar-fill{width:100%;border-radius:4px 4px 0 0;transition:height .5s ease;min-height:2px}
.month-bar-label{font-size:9px;color:var(--text-secondary)}
/* Category list */
.cat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.cat-pill{display:flex;align-items:center;gap:10px;background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-md);padding:12px 14px}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-name{flex:1;font-size:15px;color:var(--text-primary)}
.cat-count{font-size:12px;color:var(--text-secondary)}
.cat-amount{font-size:15px;font-weight:600;color:var(--text-primary);font-variant-numeric:tabular-nums}
/* Receipt group */
.receipt-list{display:flex;flex-direction:column;gap:10px}
.receipt-group{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.receipt-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.receipt-header:active{background:var(--bg-secondary)}
.receipt-store-icon{width:38px;height:38px;border-radius:50%;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;color:var(--text-secondary)}
.receipt-info{flex:1;min-width:0}
.receipt-store{font-size:15px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.receipt-meta{font-size:12px;color:var(--text-secondary);margin-top:2px;display:flex;align-items:center;gap:6px}
.cat-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.cat-badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px}
.receipt-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.receipt-total{font-size:16px;font-weight:700;color:var(--text-primary);font-variant-numeric:tabular-nums}
.receipt-chevron{font-size:14px;color:var(--text-secondary);transition:transform .2s}
.receipt-group.open .receipt-chevron{transform:rotate(90deg)}
.receipt-items{display:none;border-top:0.5px solid var(--border)}
.receipt-group.open .receipt-items{display:block}
.receipt-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:0.5px solid var(--border)}
.receipt-item:last-child{border-bottom:none}
.item-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.item-name{flex:1;font-size:14px;color:var(--text-primary)}
.item-cat-label{font-size:11px;color:var(--text-secondary);flex-shrink:0}
.item-amount{font-size:14px;font-weight:500;color:var(--text-primary);font-variant-numeric:tabular-nums;flex-shrink:0;margin-left:8px}
/* learned badge */
.learned-badge{font-size:9px;background:rgba(52,199,89,.15);color:#1a8c3a;border-radius:3px;padding:1px 4px;font-weight:600;flex-shrink:0}
@media(prefers-color-scheme:dark){.learned-badge{background:rgba(52,199,89,.2);color:#4cd964}}
.receipt-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg-secondary)}
.receipt-footer-total{font-size:13px;color:var(--text-secondary)}
.receipt-footer-total strong{color:var(--text-primary);font-size:15px}
.receipt-actions{display:flex;gap:8px}
.btn-icon{background:none;border:0.5px solid var(--border-md);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;color:var(--text-secondary);font-family:inherit;display:flex;align-items:center;gap:4px}
.btn-icon-red{color:var(--red);border-color:rgba(255,59,48,.3)}
.btn-icon:active{opacity:0.6}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal{background:var(--bg-primary);border-radius:20px 20px 0 0;padding:8px 20px max(24px,env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:92dvh;overflow-y:auto;position:relative;display:flex;flex-direction:column}
.modal-handle{width:36px;height:4px;background:var(--border-md);border-radius:2px;margin:12px auto 16px}
.modal h2{font-size:17px;font-weight:600;margin-bottom:20px;text-align:center;color:var(--text-primary)}
#modal-body{flex:1;overflow-y:auto}
#modal-footer{flex-shrink:0;padding:12px 0 0}
#modal-body{flex:1;overflow-y:auto}
#modal-footer{flex-shrink:0;padding:12px 0 0}
/* Upload choose buttons */
.upload-choices{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.upload-choice{display:flex;align-items:center;gap:14px;background:var(--bg-secondary);border:0.5px solid var(--border-md);border-radius:var(--radius-lg);padding:16px;cursor:pointer;font-family:inherit;width:100%;text-align:left}
.upload-choice:active{background:var(--bg-tertiary)}
.upload-choice-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.upload-choice-text{display:flex;flex-direction:column;gap:3px}
.upload-choice-title{font-size:15px;font-weight:600;color:var(--text-primary)}
.upload-choice-sub{font-size:12px;color:var(--text-secondary)}
/* Analyzing */
.analyzing{display:flex;flex-direction:column;align-items:center;gap:14px;padding:32px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--text-primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.analyze-steps{display:flex;flex-direction:column;gap:8px;width:100%;margin-top:8px}
.analyze-step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-secondary)}
.analyze-step.done{color:var(--green)}
.analyze-step.active{color:var(--text-primary);font-weight:500}
/* Form */
.result-section{display:flex;flex-direction:column;gap:14px}
.result-field{display:flex;flex-direction:column;gap:6px}
.result-field label{font-size:12px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.result-field input,.result-field select{padding:12px 14px;border:0.5px solid var(--border-md);border-radius:var(--radius-md);font-size:16px;background:var(--bg-secondary);color:var(--text-primary);font-family:inherit;-webkit-appearance:none;width:100%}
.result-field input:focus,.result-field select:focus{outline:none;border-color:var(--blue)}
/* Actions */
.modal-actions{display:flex;gap:10px;padding-top:12px;border-top:0.5px solid var(--border)}
.btn-cancel{flex:1;padding:14px;background:var(--bg-secondary);border:0.5px solid var(--border-md);border-radius:var(--radius-md);font-size:16px;cursor:pointer;color:var(--text-secondary);font-family:inherit}
.btn-save{flex:2;padding:14px;background:var(--blue);border:none;border-radius:var(--radius-md);font-size:16px;font-weight:600;cursor:pointer;color:#fff;font-family:inherit}
.btn-save:active{opacity:0.8}
.btn-cancel:active{opacity:0.7}
.btn-delete-full{width:100%;padding:14px;background:#fff2f2;border:0.5px solid rgba(255,59,48,.3);border-radius:var(--radius-md);font-size:15px;font-weight:500;cursor:pointer;color:var(--red);font-family:inherit;margin-top:10px}
@media(prefers-color-scheme:dark){.btn-delete-full{background:#3a1515}}
/* Preview */
.preview-img{width:100%;max-height:160px;object-fit:contain;border-radius:var(--radius-md);margin-bottom:14px;border:0.5px solid var(--border)}
/* Info note */
.info-note{background:#e8f0fe;border-radius:var(--radius-md);padding:10px 14px;font-size:13px;color:#1a56db;margin-bottom:16px;display:flex;align-items:flex-start;gap:8px}
@media(prefers-color-scheme:dark){.info-note{background:#1a2d5a;color:#7aadff}}
/* DB stats note */
.db-note{background:rgba(52,199,89,.1);border:0.5px solid rgba(52,199,89,.3);border-radius:var(--radius-md);padding:8px 12px;font-size:12px;color:#1a8c3a;margin-bottom:12px;display:flex;align-items:center;gap:8px}
@media(prefers-color-scheme:dark){.db-note{color:#4cd964;background:rgba(52,199,89,.15)}}
/* Empty */
.empty{text-align:center;padding:40px 16px;color:var(--text-secondary);font-size:15px}
.empty i{font-size:40px;display:block;margin-bottom:12px;opacity:0.4}
/* Edit item row */
.edit-item-row{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-md);padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.edit-item-row input,.edit-item-row select{padding:7px 10px;border:0.5px solid var(--border-md);border-radius:8px;font-size:14px;background:var(--bg-secondary);color:var(--text-primary);font-family:inherit;-webkit-appearance:none}
/* learned indicator in edit row */
.learned-tag{font-size:10px;color:var(--green);font-weight:600}
.safe-bottom{padding-bottom:env(safe-area-inset-bottom)}

.tax-tag-8{font-size:10px;padding:2px 5px;background:#e8f5e9;color:#2e7d32;border-radius:8px;white-space:nowrap;font-weight:600}
.tax-tag-10{font-size:10px;padding:2px 5px;background:#fff3e0;color:#e65100;border-radius:8px;white-space:nowrap;font-weight:600}
.tax-tag-0{font-size:10px;padding:2px 5px;background:#f0f0f0;color:#888;border-radius:8px;white-space:nowrap;font-weight:600}
.tax-toggle{border:none;border-radius:12px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-appearance:none}
.tax-toggle.tax-8{background:#e8f5e9;color:#2e7d32}
.tax-toggle.tax-10{background:#fff3e0;color:#e65100}
.tax-toggle.tax-0{background:#f0f0f0;color:#888}
.btn-add-item{width:100%;margin-top:4px;padding:8px;border:1px dashed var(--border-md);border-radius:var(--radius-md);background:none;color:var(--text-secondary);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1><i class="ti ti-wallet" aria-hidden="true"></i>家計簿</h1>
      <button class="add-btn" onclick="openCsvModal()"><i class="ti ti-table-import" aria-hidden="true"></i>入力</button>
    </div>
    <div class="nav">
      <button class="nav-btn active" onclick="switchView('month',this)">月別</button>
      <button class="nav-btn" onclick="switchView('year',this)">年別</button>
      <button class="nav-btn" onclick="switchView('receipts',this)">明細</button>
      <button class="nav-btn" onclick="switchView('store',this)">店舗</button>
      <button class="nav-btn" onclick="switchView('genre',this)">ジャンル</button>
    </div>
  </div>
  <div class="period-nav">
    <button class="period-arrow" onclick="changePeriod(-1)"><i class="ti ti-chevron-left"></i></button>
    <span class="period-label" id="period-label"></span>
    <button class="period-arrow" onclick="changePeriod(1)"><i class="ti ti-chevron-right"></i></button>
  </div>
  <div class="content safe-bottom" id="content"></div>
</div>

<div class="modal-bg" id="modal" style="display:none" onclick="handleModalBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
    <div id="modal-footer"></div>
  </div>
</div>

<!-- hidden file inputs -->

<script>
// ══════════════════════════════════════════════════════
// カテゴリ定義
// ══════════════════════════════════════════════════════
const CATS = {
  食費:   { color:'#1D9E75', icon:'ti-salad',           bg:'#E1F5EE' },
  酒類:   { color:'#7B3FA0', icon:'ti-bottle',          bg:'#F3E8FB' },
  外食:   { color:'#D85A30', icon:'ti-tools-kitchen-2', bg:'#FAECE7' },
  薬:     { color:'#378ADD', icon:'ti-pill',            bg:'#E6F1FB' },
  衣類:   { color:'#D4537E', icon:'ti-shirt',           bg:'#FBEAF0' },
  日用品: { color:'#BA7517', icon:'ti-home',            bg:'#FAEEDA' },
  交通:   { color:'#534AB7', icon:'ti-train',           bg:'#EEEDFE' },
  その他: { color:'#888780', icon:'ti-dots',            bg:'#F1EFE8' },
};

// カテゴリ → デフォルト税率 (8% or 10%)
const CAT_TAX = {
  食費:8, 酒類:10, 外食:10, 薬:10, 衣類:10, 日用品:10, 交通:10, その他:10,
};
function defaultTax(category){ return CAT_TAX[category]||10; }

// 商品名から酒類かどうかを判定（酒類は食品扱いでも10%）
const ALCOHOL_RE = /ビール|発泡酒|チューハイ|サワー|ハイボール|ウイスキー|ウィスキー|焼酎|日本酒|清酒|ワイン|シャンパン|ブランデー|ジン|ウォッカ|テキーラ|梅酒|リキュール|ストロング|酎ハイ|レモンサワー|レモンチューハイ|生ビール|缶ビール|バーボン|ラム酒|みりん風/i;

// 外食店舗名の判定
const DINING_RE = /レストラン|食堂|定食|居酒屋|バー|カフェ|喫茶|ラーメン|寿司|すし|焼肉|焼き鳥|やきとり|うどん|そば|蕎麦|パスタ|ピザ|ファミレス|ファストフード|マクドナルド|マック|モスバーガー|ケンタッキー|KFC|スターバックス|スタバ|ドトール|コメダ|サイゼ|ガスト|デニーズ|ジョナサン|すき家|吉野家|松屋|なか卯|丸亀|天丼|とんかつ|しゃぶしゃぶ|焼肉|牛丼|中華/i;

function itemTax(name, category, store){
  // 外食店舗は10%（店名で判断）
  if(DINING_RE.test(store||'')) return 10;
  // 酒類カテゴリは常に10%
  if(category==='酒類'||category==='外食') return 10;
  // 商品名に酒類キーワードがあれば10%
  if(ALCOHOL_RE.test(name||'')) return 10;
  return defaultTax(category);
}

// CSVジャンル → カテゴリ のマッピング
const CSV_CAT_MAP = {
  '米・穀類':'食費','お菓子・スナック':'食費','パン':'食費','飲料':'食費',
  '調味料・レトルト':'食費','お酒':'酒類','加工食品・チーズ':'食費',
  '肉・魚・惣菜':'食費','野菜・果物':'食費','乳製品・卵':'食費',
  '食品全般':'食費','菓子':'食費',
  '外食':'外食','カフェ':'外食','テイクアウト':'外食',
  '医薬品':'薬','サプリ':'薬','衛生用品':'薬','ヘルスケア':'薬',
  '衣類':'衣類','靴・バッグ':'衣類','アクセサリー':'衣類',
  '日用品':'日用品','洗剤':'日用品','文具':'日用品','家電':'日用品',
  '交通':'交通','ガソリン':'交通',
};

// ══════════════════════════════════════════════════════
// 学習DB
// 構造: { items: { "正規化商品名": "カテゴリ" },
//          stores: { "正規化店名": "最頻カテゴリ" } }
// ══════════════════════════════════════════════════════
let learnDB = JSON.parse(localStorage.getItem('kakeibo_learndb') || '{"items":{},"stores":{}}');

function normalizeKey(s) {
  return s.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0))
          .replace(/[ぁ-ん]/g, c => String.fromCharCode(c.charCodeAt(0)+0x60))
          .toLowerCase().trim();
}

/** 保存時に商品名→カテゴリを学習 */
function learnFromItems(store, items) {
  items.forEach(item => {
    if (!item.name || !item.category) return;
    learnDB.items[normalizeKey(item.name)] = item.category;
  });
  // 店名→最頻カテゴリ
  const freq = {};
  items.forEach(i => { freq[i.category] = (freq[i.category]||0)+1; });
  const top = Object.entries(freq).sort((a,b)=>b[1]-a[1])[0];
  if (top) learnDB.stores[normalizeKey(store)] = top[0];
  localStorage.setItem('kakeibo_learndb', JSON.stringify(learnDB));
}

/** 商品名でDB検索 → カテゴリを返す（見つからなければ null） */
function lookupItem(name) {
  return learnDB.items[normalizeKey(name)] || null;
}

/** 店名でDB検索 */
function lookupStore(store) {
  return learnDB.stores[normalizeKey(store)] || null;
}

/** DBの件数 */
function dbCount() {
  return { items: Object.keys(learnDB.items).length, stores: Object.keys(learnDB.stores).length };
}

let currentView = 'month';
let currentDate = new Date();
let receipts = JSON.parse(localStorage.getItem('kakeibo_receipts') || 'null');

if (!receipts) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth()+1;
  const pm = m===1?12:m-1, py = m===1?y-1:y;
  const p = n => String(n).padStart(2,'0');
  receipts = [];
  save();
}

function save() { localStorage.setItem('kakeibo_receipts', JSON.stringify(receipts)); }
function fmt(n) { return '¥'+Math.round(n).toLocaleString('ja-JP'); }
function pad(n) { return String(n).padStart(2,'0'); }
function todayStr() {
  const d=new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function itemTaxed(item){
  // item.taxのみで計算。0=「なし」は金額そのまま
  const rate = item.tax ?? 10;
  if(rate===0) return item.amount;
  return Math.floor(item.amount * (1 + rate/100));
}
function receiptTotal(r){
  return r.items.reduce((s,i)=>s+itemTaxed(i), 0);
}
function receiptPretaxTotal(r){
  return r.items.reduce((s,i)=>s+i.amount, 0);
}

function filteredReceipts() {
  const y=currentDate.getFullYear(), m=currentDate.getMonth()+1;
  return receipts.filter(r=>{
    const [ry,rm]=r.date.split('-').map(Number);
    return currentView==='year'?ry===y:ry===y&&rm===m;
  });
}
function catTotals(rs) {
  const t={};
  rs.forEach(r=>r.items.forEach(i=>{t[i.category]=(t[i.category]||0)+i.amount}));
  return t;
}

function switchView(v,el){
  currentView=v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

}
function changePeriod(dir){
  currentView==='year'
    ?currentDate.setFullYear(currentDate.getFullYear()+dir)
    :currentDate.setMonth(currentDate.getMonth()+dir);
  render();
}
function getPeriodLabel(){
  const y=currentDate.getFullYear(),m=currentDate.getMonth()+1;
  return currentView==='year'?`${y}年`:`${y}年 ${m}月`;
}

function render(){
  document.getElementById('period-label').textContent=getPeriodLabel();
  const rs=filteredReceipts();
  const total=rs.reduce((s,r)=>s+receiptTotal(r),0);
  const totals=catTotals(rs);
  const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const maxVal=sorted[0]?.[1]||1;
  const cnt=document.getElementById('content');
  if(currentView==='receipts') renderReceipts(cnt,rs,total);
  else if(currentView==='year') renderYear(cnt,rs,total,sorted,maxVal);
  else if(currentView==='store') renderStore(cnt,rs,total);
  else if(currentView==='genre') renderGenre(cnt,rs,total,sorted,maxVal);
  else renderMonth(cnt,rs,total,sorted,maxVal);
}

function parseCsvAndConfirm(){
  const text=document.getElementById('csv-text').value.trim();
  const date=document.getElementById('csv-date').value||todayStr();
  const errEl=document.getElementById('csv-error');
  errEl.textContent='';
  if(!text){errEl.textContent='テキストを入力してください';return;}

  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const dataLines=lines.filter(l=>!/^(店名|店舗|店|store)/i.test(l.trim()));
  if(!dataLines.length){errEl.textContent='データ行が見つかりません';return;}

  const byStore={};
  let parseErr=0;
  dataLines.forEach(line=>{
    const raw=line.split(',').map(s=>s.trim());
    const priceIdx=raw.findIndex(s=>/^[¥$￥]/.test(s));
    if(priceIdx<2){parseErr++;return;}
    const store=raw[0];
    const name=raw.slice(1,priceIdx).join('');
    let priceEnd=priceIdx;
    while(priceEnd+1<raw.length&&/^[0-9,]+$/.test(raw[priceEnd+1])) priceEnd++;
    const priceRaw=raw.slice(priceIdx,priceEnd+1).join('');
    const genreRaw=raw.slice(priceEnd+1).join(',');
    const amount=parseInt(priceRaw.replace(/[^0-9]/g,''))||0;
    if(!store||!name||amount<=0){parseErr++;return;}

    let category='その他';
    const g=genreRaw.trim();
    if(g){
      if(CATS[g]) category=g;
      else if(CSV_CAT_MAP[g]) category=CSV_CAT_MAP[g];
      else {
        const found=Object.keys(CSV_CAT_MAP).find(k=>g.includes(k)||k.includes(g));
        if(found) category=CSV_CAT_MAP[found];
        else if(/食|米|肉|魚|野菜|果物|菓子|スナック|飲料|酒|パン|乳|卵|調味|レトルト|チーズ|加工/.test(g)) category='食費';
      }
      const dbCat=lookupItem(name);
      if(dbCat) category=dbCat;
    }

    // 商品名・カテゴリ・店名から税率を自動判定
    const tax=itemTax(name,category,store);
    if(!byStore[store]) byStore[store]=[];
    byStore[store].push({id:Date.now()+Math.random(),name,amount,category,tax,learned:!!lookupItem(name)});
  });

  const stores=Object.keys(byStore);
  if(!stores.length){errEl.textContent='有効なデータが見つかりませんでした';return;}

  _csvByStore=byStore;
  _csvDate=date;
  showCsvConfirmForm(date,byStore,parseErr);
}

        }).join('')}
      </div>
    </div>`;
  }).join('');

  document.getElementById('modal-title').textContent='内容を確認・編集';
  document.getElementById('modal-body').innerHTML=`
    <div class="db-note" style="margin-bottom:12px"><i class="ti ti-sparkles"></i> ${stores.length}店舗・${Object.values(byStore).flat().length}品目 税込合計 ${fmt(grandTaxed)}</div>
    <div class="result-field" style="margin-bottom:12px">
      <label>購入日</label>
      <input type="date" id="csv-final-date" value="${date}">
    </div>
    <div style="margin-bottom:8px">${storeFormsHtml}</div>`;
  document.getElementById('modal-footer').innerHTML='<div class="modal-actions"><button class="btn-cancel" id="mf-cancel"><i class="ti ti-plus"></i> 商品を追加</button><button class="btn-save" id="mf-ok">保存して学習</button></div>';
  document.getElementById('mf-cancel').addEventListener('click', backToInput);
  document.getElementById('mf-ok').addEventListener('click', saveCsvData);
}

function backToInput(){
  // 入力フォームに戻るが既存データは保持
  openCsvModal();
  // 既存の店名・日付を復元
  if(_csvDate) document.getElementById('csv-date').value=_csvDate;
  const stores=Object.keys(_csvByStore);
  if(stores.length>0) document.getElementById('csv-store').value=stores[stores.length-1];
}

function toggleCsvItemTax(btn, si, store){
  const cur = parseInt(btn.dataset.tax);
  const next = cur===10?8:cur===8?0:10;
  btn.dataset.tax = next;
  btn.textContent = next===0?'なし':next+'%';
  btn.className = 'tax-toggle tax-'+(next===0?0:next)+' c-tax';
  // _csvByStoreのitem.taxを更新
  const row = btn.closest('.edit-item-row');
  const ii = parseInt(row.dataset.citem);
  if(_csvByStore[store]?.[ii]) _csvByStore[store][ii].tax = next;
  // 店舗合計をDOMから再計算して更新
  updateStoreTaxed(si, store);
  updateCsvSummary();
}

function updateStoreTaxed(si, store){
  // 店舗内の全ボタンからdata-taxとinput[c-amt]を読んで合計を算出
  const storeEl = document.getElementById('csv-store-'+si);
  if(!storeEl) return;
  let taxed = 0;
  storeEl.querySelectorAll('.edit-item-row').forEach(row=>{
    const amt = parseInt(row.querySelector('.c-amt').value)||0;
    const tax = parseInt(row.querySelector('.c-tax').dataset.tax);
    taxed += (tax===0 ? amt : Math.floor(amt*(1+tax/100)));
  });
  // 店舗ヘッダーの合計表示を更新（親要素のreceipt-groupの最初のdivの最後の子）
  const header = storeEl.previousElementSibling;
  if(header){
    const totalEl = header.querySelector('.store-taxed-total');
    if(totalEl) totalEl.textContent = '税込 '+fmt(taxed);
  }
}

function updateCsvSummary(){
  // DOMから直接再計算（_csvByStoreより確実）
  let grandTaxed = 0;
  document.querySelectorAll('#csv-store-0, [id^="csv-store-"]').forEach(storeEl=>{
    storeEl.querySelectorAll('.edit-item-row').forEach(row=>{
      const amt = parseInt(row.querySelector('.c-amt')?.value)||0;
      const tax = parseInt(row.querySelector('.c-tax')?.dataset.tax??10);
      grandTaxed += (tax===0 ? amt : Math.floor(amt*(1+tax/100)));
    });
  });
  const note = document.querySelector('.db-note');
  if(note){
    const stores = Object.keys(_csvByStore).length;
    const items = document.querySelectorAll('[id^="csv-store-"] .edit-item-row').length;
    note.innerHTML=`<i class="ti ti-sparkles"></i> ${stores}店舗・${items}品目 税込合計 ${fmt(grandTaxed)}`;
  }
}

function onCsvCatChange(sel, si, store){
  const row=sel.closest('.edit-item-row');
  const ii=row.dataset.citem;
  if(_csvByStore[store]&&_csvByStore[store][ii]){
    const newTax=defaultTax(sel.value);
    _csvByStore[store][ii].tax=newTax;
    _csvByStore[store][ii].category=sel.value;
    showCsvConfirmForm(_csvDate,_csvByStore,0);
  }
}

function addCsvItem(store, si){
  backToInput();
  document.getElementById('csv-store').value=store;
}


function saveCsvData(){
  const stores=_csvStores;
  const date=document.getElementById('csv-final-date').value||todayStr();
  let saved=0;
  stores.forEach((store,si)=>{
    const rows=document.querySelectorAll(`[data-cstore="${si}"]`);
    const items=[];
    rows.forEach((row,ii)=>{
      const name=row.querySelector('.c-name').value.trim()||'不明';
      const amount=parseInt(row.querySelector('.c-amt').value)||0;
      const category=row.querySelector('.c-cat').value;
      const storedItem=_csvByStore[store]?.[ii];
      const tax=storedItem?.tax??defaultTax(category);
      if(amount>0) items.push({id:Date.now()+Math.random(),name,amount,category,tax,learned:false});
    });
    if(!items.length) return;
    learnFromItems(store,items);
    receipts.push({id:Date.now()+saved,date,store,items});
    saved++;
  });
  if(!saved){alert('保存できるデータがありません');return;}
  // リセット
  _csvByStore={};_csvDate='';_csvStores=[];
  save();
  closeModal();
  currentDate=new Date(date+'T00:00:00');
  currentView='receipts';
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===2));
  render();
}

function openEditReceipt(id){
  const r=receipts.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('modal').style.display='flex';
  document.getElementById('modal-title').textContent='レシートを編集';
  document.getElementById('modal-body').innerHTML=`
    <div class="result-section" style="margin-bottom:14px">
      <div style="display:flex;gap:10px">
        <div class="result-field" style="flex:1"><label>日付</label><input type="date" id="e-date" value="${r.date}"></div>
        <div class="result-field" style="flex:1"><label>店舗名</label><input type="text" id="e-store" value="${r.store}"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <p class="section-title" style="margin:0">品目 (${r.items.length}点)</p>
      <button onclick="addEditItem(${id})" style="background:none;border:none;color:#007aff;font-size:13px;cursor:pointer;font-family:inherit"><i class="ti ti-plus"></i> 追加</button>
    </div>
    <div id="edit-items-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
      ${r.items.map(item=>editItemRow(item)).join('')}
    </div>
    <div style="background:var(--bg-secondary);border-radius:var(--radius-md);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-size:14px;color:var(--text-secondary);font-weight:500">税込合計</span>
      <span id="edit-total" style="font-size:18px;font-weight:700;color:var(--text-primary)">${fmt(receiptTotal(r))}</span>
    </div>
    <button class="btn-delete-full" onclick="deleteReceipt(${id})"><i class="ti ti-trash"></i> このレシートを削除</button>`;
  document.getElementById('modal-footer').innerHTML='<div class="modal-actions"><button class="btn-cancel" id="mf-cancel">閉じる</button><button class="btn-save" id="mf-ok">保存して学習</button></div>';
  document.getElementById('mf-cancel').addEventListener('click',closeModal);
  document.getElementById('mf-ok').addEventListener('click',()=>saveEditReceipt(id));

  document.getElementById('edit-items-list').addEventListener('change', updateEditTotal);
}

function editItemRow(item, defaultRate){
  const learnTag=item.learned?`<span class="learned-tag">学習済</span>`:'';
  const tax=item.tax??defaultRate??10;
  return `<div class="edit-item-row" data-eid="${item.id}">
    <div style="display:flex;gap:8px;align-items:center">
      <input class="e-name" value="${item.name}" placeholder="商品名" style="flex:1">
      ${learnTag}
      <button onclick="removeEditItem('${item.id}')" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:18px;padding:4px;flex-shrink:0"><i class="ti ti-x"></i></button>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <select class="e-cat" style="flex:1" onchange="onEditCatChange(this)">${catOpts(item.category)}</select>
      <input class="e-amt" type="number" value="${item.amount}" inputmode="numeric" style="width:80px;text-align:right">
      <button class="tax-toggle tax-${tax===0?0:tax} e-tax" data-tax="${tax}" onclick="toggleEditItemTax(this)">${tax===0?'なし':tax+'%'}</button>
    </div>
  </div>`;
}

function toggleEditItemTax(btn){
  const cur=parseInt(btn.dataset.tax);
  const next=cur===10?8:cur===8?0:10;
  btn.dataset.tax=next;
  btn.textContent=next===0?'なし':next+'%';
  btn.className='tax-toggle tax-'+(next===0?0:next)+' e-tax';
  updateEditTotal();
}

function onEditCatChange(sel){
  // カテゴリ変更時に税率を自動更新（ただし手動変更済みは上書きしない）
  const row=sel.closest('.edit-item-row');
  const taxBtn=row.querySelector('.e-tax');
  const name=row.querySelector('.e-name').value;
  const newTax=itemTax(name, sel.value, document.getElementById('e-store')?.value||'');
  taxBtn.dataset.tax=newTax;
  taxBtn.textContent=newTax+'%';
  taxBtn.className='tax-toggle '+(newTax===8?'tax-8':'tax-10')+' e-tax';
  updateEditTotal();
}

function updateEditTotal(){
  const rows=document.querySelectorAll('#edit-items-list [data-eid]');
  let total=0;
  rows.forEach(row=>{
    const amt=parseInt(row.querySelector('.e-amt').value)||0;
    const tax=parseInt(row.querySelector('.e-tax').dataset.tax)||10;
    total+=(tax===0?amt:Math.floor(amt*(1+tax/100)));
  });
  const el=document.getElementById('edit-total');
  if(el) el.textContent=fmt(total);
}

function syncEditFromDOM(rid){
  const r=receipts.find(x=>x.id===rid);
  if(!r) return 0;
  r.items=[];
  document.querySelectorAll('#edit-items-list [data-eid]').forEach(row=>{
    r.items.push({
      id:row.dataset.eid,
      name:row.querySelector('.e-name').value.trim()||'不明',
      amount:parseInt(row.querySelector('.e-amt').value)||0,
      category:row.querySelector('.e-cat').value,
      tax:parseInt(row.querySelector('.e-tax').dataset.tax)||10,
      learned:false,
    });
  });
  return receiptTotal(r);
}

function addEditItem(rid){
  syncEditFromDOM(rid);
  const r=receipts.find(x=>x.id===rid);
  if(!r) return;
  const newItem={id:'new_'+Date.now(),name:'',amount:0,category:'その他',tax:10,learned:false};
  r.items.push(newItem);
  const list=document.getElementById('edit-items-list');
  const div=document.createElement('div');
  div.innerHTML=editItemRow(newItem);
  list.appendChild(div.firstElementChild);
}

function removeEditItem(itemId){
  document.querySelector(`[data-eid="${itemId}"]`)?.remove();
}

function saveEditReceipt(rid){
  const r=receipts.find(x=>x.id===rid);
  if(!r) return;
  r.date=document.getElementById('e-date').value;
  r.store=document.getElementById('e-store').value.trim()||'不明';
  syncEditFromDOM(rid);
  r.items=r.items.filter(x=>x.amount>0);
  // ★ 編集後も学習
  learnFromItems(r.store,r.items);
  save();
  closeModal();
  render();
}

function deleteReceipt(id){
  if(!confirm('このレシートをすべて削除しますか？')) return;
  receipts=receipts.filter(r=>r.id!==id);
  save();
  closeModal();
  render();
}

// ══════════════════════════════════════════════════════
// 初期化
// ══════════════════════════════════════════════════════
render();
</script>
</body>
</html>
